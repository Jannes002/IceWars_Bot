services:
  icewars-bot:
    build:
      context: https://github.com/Jannes002/IceWars_Bot.git
    container_name: icewars-bot
    restart: unless-stopped

    networks:
      icewars_net:
        ipv4_address: 10.0.0.63

    ports:
      - "10.0.0.63:80:8050"

    volumes:
      - /mnt/user/appdata/icewars-bot/data:/app/data
      - /mnt/user/appdata/icewars-bot/logs:/app/logs

    shm_size: '256mb'

    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8050/api/setup/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  icewars_net:
    driver: macvlan
    driver_opts:
      parent: eth0        # Netzwerk-Interface des Hosts – ggf. anpassen (z. B. bond0, ens3)
    ipam:
      config:
        - subnet: 10.0.0.0/23
          gateway: 10.0.0.1
