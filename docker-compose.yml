services:
  icewars-bot:
    image: ghcr.io/jannes002/icewars-bot:latest
    container_name: icewars-bot
    restart: unless-stopped

    ports:
      - "8050:8050"   # Dashboard — im Browser öffnen um den Bot zu konfigurieren

    volumes:
      # Unraid: /mnt/user/appdata/icewars-bot/ als Basis empfohlen
      - /mnt/user/appdata/icewars-bot/data:/app/data   # Credentials, DB, Goals
      - /mnt/user/appdata/icewars-bot/logs:/app/logs   # Log-Dateien

    # Chromium braucht ausreichend Shared Memory
    shm_size: '256mb'

    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8050/api/setup/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
